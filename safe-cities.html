<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saad Gulzar - Digital Access to Justice</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Lato', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        ndblue: '#002b5c',
                        ndgold: '#c99700',
                    }
                }
            }
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #fdfdfd; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const ProjectPage = () => {
            const [activeTab, setActiveTab] = useState('overview');

            const authors = [
                { name: "Bakhtawar Ali", affiliation: "Aix-Marseille School of Economics" },
                { name: "Saad Gulzar", affiliation: "University of Notre Dame" },
                { name: "Muhammad Yasir Khan", affiliation: "University of Pittsburgh" },
                { name: "Muhammad Ahsan Yonus", affiliation: "Punjab Safe Cities Authority" },
                { name: "Amna Baig", affiliation: "Punjab Safe Cities Authority" }
            ];

            return (
                <div className="min-h-screen font-sans text-gray-800">
                    
                    {/* Minimal Header */}
                    <header className="bg-white border-b border-gray-200 sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <a href="index.html" className="text-ndblue hover:text-ndgold font-semibold transition flex items-center gap-2">
                                <i className="fas fa-arrow-left"></i> Back to Research
                            </a>
                            <div className="font-serif text-xl font-bold text-gray-800">Saad Gulzar</div>
                        </div>
                    </header>

                    {/* Hero Section */}
                    <div className="bg-ndblue text-white py-16 md:py-24">
                        <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
                            <div className="inline-block px-4 py-1 bg-white/10 rounded-full text-ndgold font-bold tracking-wide uppercase text-sm mb-6">
                                Working Paper
                            </div>
                            <h1 className="font-serif text-4xl md:text-5xl lg:text-6xl font-bold leading-tight mb-6">
                                Digital Access to Justice
                            </h1>
                            <p className="text-xl md:text-2xl text-gray-200 font-serif italic mb-10">
                                Evidence from Women's Virtual Police Stations in Pakistan
                            </p>
                            
                            {/* Download Button */}
                            <a href="files/pakistan_police.pdf" target="_blank" rel="noopener noreferrer" 
                               className="inline-flex items-center gap-3 bg-ndgold hover:bg-yellow-500 text-white font-bold py-3 px-8 rounded transition duration-200 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5">
                                <i className="fas fa-file-pdf text-xl"></i>
                                Download Working Paper (PDF)
                            </a>
                        </div>
                    </div>

                    {/* Main Content Area */}
                    <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
                        <div className="flex flex-col lg:flex-row gap-12">
                            
                            {/* Left Sidebar (Authors & Partners) */}
                            <div className="lg:w-1/3 space-y-8">
                                
                                {/* Authors Card */}
                                <div className="bg-white p-6 border border-gray-200 rounded-lg shadow-sm">
                                    <h3 className="font-serif text-xl font-bold text-ndblue mb-4 border-b pb-2">Research Team</h3>
                                    <ul className="space-y-4">
                                        {authors.map((author, idx) => (
                                            <li key={idx} className="leading-tight">
                                                <div className="font-bold text-gray-900">{author.name}</div>
                                                <div className="text-sm text-gray-500">{author.affiliation}</div>
                                            </li>
                                        ))}
                                    </ul>
                                </div>

                                {/* Partnership Card */}
                                <div className="bg-gray-50 p-6 border border-gray-200 rounded-lg shadow-sm border-l-4 border-l-ndgold">
                                    <h3 className="font-serif text-xl font-bold text-ndblue mb-3">Institutional Partner</h3>
                                    <p className="text-sm text-gray-600 mb-4">This project leverages high-frequency administrative data and field interventions in collaboration with the Punjab Police and the Safe Cities Authority.</p>
                                    <div className="font-bold text-gray-800">Punjab Safe Cities Authority (PSCA)</div>
                                </div>
                            </div>

                            {/* Right Content Area (Interactive Tabs) */}
                            <div className="lg:w-2/3">
                                
                                {/* Tab Navigation */}
                                <div className="flex overflow-x-auto hide-scrollbar border-b border-gray-200 mb-8 pb-1">
                                    {['overview', 'findings', 'methodology', 'media'].map((tab) => (
                                        <button 
                                            key={tab}
                                            onClick={() => setActiveTab(tab)}
                                            className={`capitalize px-6 py-3 font-bold text-sm tracking-wide transition-colors whitespace-nowrap ${
                                                activeTab === tab 
                                                ? 'text-ndblue border-b-2 border-ndgold' 
                                                : 'text-gray-400 hover:text-gray-700'
                                            }`}
                                        >
                                            {tab === 'media' ? 'Media & Impact' : tab.replace('-', ' ')}
                                        </button>
                                    ))}
                                </div>

                                {/* Tab Content */}
                                <div className="bg-white p-8 border border-gray-100 rounded-lg shadow-sm">
                                    
                                    {/* OVERVIEW TAB */}
                                    {activeTab === 'overview' && (
                                        <div className="space-y-6 text-gray-700 leading-relaxed text-lg">
                                            <h2 className="font-serif text-2xl font-bold text-ndblue">Abstract</h2>
                                            <p>
                                                This paper studies a large-scale digital reform in Pakistan that changes the entry point to justice: Women's Virtual Police Stations (WVPS). The WVPS allows women to report Gender-Based Violence (GBV) remotely through a centralized phone-based intake system and digital case management. This reduces the need for in-person visits and potentially limits local discretion at first contact.
                                            </p>
                                            <p>
                                                We combine high-frequency administrative data on police calls and complaints with downstream records on case registration and escalation to examine how digital access reshapes reporting and early-stage justice delivery. 
                                            </p>
                                            <div className="bg-blue-50 p-4 rounded-md border border-blue-100 mt-6">
                                                <strong className="text-ndblue block mb-2">The Core Problem:</strong>
                                                In many low-capacity states, the criminal justice system fails long before a case reaches a courtroom. For women facing GBV, approaching the police requires traveling to a station under household monitoring, facing social stigma, and confronting discretionary gatekeeping.
                                            </div>
                                        </div>
                                    )}

                                    {/* KEY FINDINGS TAB */}
                                    {activeTab === 'findings' && (
                                        <div className="space-y-8 text-gray-700">
                                            <h2 className="font-serif text-2xl font-bold text-ndblue mb-6">Key Results</h2>
                                            
                                            <div className="flex items-start gap-4">
                                                <div className="bg-green-100 text-green-700 p-3 rounded-full"><i className="fas fa-chart-line text-xl"></i></div>
                                                <div>
                                                    <h4 className="font-bold text-xl text-gray-900 mb-2">1. Increased Reporting of GBV</h4>
                                                    <p>The WVPS increases reported GBV incidents. The effects are heavily concentrated in categories where social stigma and household control are plausibly the most binding constraints for women.</p>
                                                </div>
                                            </div>

                                            <div className="flex items-start gap-4">
                                                <div className="bg-blue-100 text-blue-700 p-3 rounded-full"><i className="fas fa-exchange-alt text-xl"></i></div>
                                                <div>
                                                    <h4 className="font-bold text-xl text-gray-900 mb-2">2. Substitution of Reporting Pathways</h4>
                                                    <p>The reform fundamentally changes the composition and pathway of reporting. Remote reporting (via the 15 emergency helpline) rises dramatically while walk-in reporting falls. This implies substantial substitution in how women engage the police, rather than purely mechanical increases in contact.</p>
                                                </div>
                                            </div>

                                            <div className="flex items-start gap-4">
                                                <div className="bg-yellow-100 text-yellow-700 p-3 rounded-full"><i className="fas fa-file-signature text-xl"></i></div>
                                                <div>
                                                    <h4 className="font-bold text-xl text-gray-900 mb-2">3. The Downstream Pipeline Bottleneck</h4>
                                                    <p>The digital intake produces measurable downstream movement along the justice pipeline, increasing formal registration (First Information Reports, or FIRs) and follow-up actions. However, this occurs with a delay, consistent with existing capacity constraints and case processing frictions at the local level.</p>
                                                </div>
                                            </div>

                                            <div className="flex items-start gap-4">
                                                <div className="bg-purple-100 text-purple-700 p-3 rounded-full"><i className="fas fa-users text-xl"></i></div>
                                                <div>
                                                    <h4 className="font-bold text-xl text-gray-900 mb-2">4. Heterogeneity by Social Conservatism</h4>
                                                    <p>In highly conservative districts, remote reporting surged but formal FIRs did not increase proportionately. The WVPS helped women overcome the barrier of initial contact, but local social norms still prevented legal escalation. In less conservative districts, the spike in remote reporting translated much more successfully into formal FIRs.</p>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* METHODOLOGY TAB */}
                                    {activeTab === 'methodology' && (
                                        <div className="space-y-6 text-gray-700 text-lg leading-relaxed">
                                            <h2 className="font-serif text-2xl font-bold text-ndblue mb-4">Data and Empirical Strategy</h2>
                                            
                                            <h4 className="font-bold text-gray-900 mt-6">Administrative Data Sources</h4>
                                            <ul className="list-disc pl-5 space-y-2">
                                                <li><strong>PUCAR 15:</strong> The centralized emergency response system, capturing real-time call-initiated reports.</li>
                                                <li><strong>Complaint Management System (CMS):</strong> The digital tracking platform that logs walk-in complaints and follows case progression into First Information Reports (FIRs).</li>
                                                <li>The data spans from 2021 through 2024, providing a comprehensive panel of police station-period observations.</li>
                                            </ul>

                                            <h4 className="font-bold text-gray-900 mt-6">Research Design</h4>
                                            <p>
                                                We implement an event-study difference-in-differences design around the February 2024 rollout of the WVPS. The strategy exploits heterogeneous exposure to the reform across police stations, proxied by baseline reporting intensity. We compare the evolution of outcomes in "high-exposure" stations (top 30% of pre-program reporting volume by emergency calls) to "lower-exposure" stations before and after implementation.
                                            </p>
                                        </div>
                                    )}

                                    {/* MEDIA TAB */}
                                    {activeTab === 'media' && (
                                        <div className="space-y-8 text-gray-700">
                                            <h2 className="font-serif text-2xl font-bold text-ndblue mb-6">Media & Real-World Impact</h2>
                                            
                                            {/* Notre Dame Article */}
                                            <a href="https://keough.nd.edu/news-and-events/news/virtual-womens-police-station-boosts-gender-based-violence-reporting-in-pakistan-notre-dame-analysis-finds/" target="_blank" className="block border border-gray-200 rounded-lg p-6 hover:shadow-md transition group">
                                                <div className="flex items-center justify-between mb-2">
                                                    <span className="text-xs font-bold uppercase tracking-wider text-ndgold">University News</span>
                                                    <i className="fas fa-external-link-alt text-gray-400 group-hover:text-ndblue"></i>
                                                </div>
                                                <h3 className="font-serif text-xl font-bold text-gray-900 group-hover:text-ndblue transition mb-2">
                                                    Virtual women’s police station boosts gender-based violence reporting in Pakistan, Notre Dame analysis finds
                                                </h3>
                                                <p className="text-gray-600 text-sm">Keough School of Global Affairs, University of Notre Dame</p>
                                            </a>

                                            {/* Government Post */}
                                            <a href="https://www.facebook.com/100044234283819/posts/1504994047651724/?rdid=klS1qQcWWbcB1ZeT#" target="_blank" className="block border border-gray-200 rounded-lg p-6 hover:shadow-md transition group">
                                                <div className="flex items-center justify-between mb-2">
                                                    <span className="text-xs font-bold uppercase tracking-wider text-[#1877F2] flex items-center gap-2">
                                                        <i className="fab fa-facebook text-lg"></i> Official Announcement
                                                    </span>
                                                    <i className="fas fa-external-link-alt text-gray-400 group-hover:text-blue-600"></i>
                                                </div>
                                                <h3 className="font-serif text-xl font-bold text-gray-900 group-hover:text-blue-600 transition mb-2">
                                                    Chief Minister of Punjab Formal Announcement
                                                </h3>
                                                <p className="text-gray-600 text-sm">View the official social media release regarding the implementation and success of the Women's Virtual Police Stations.</p>
                                            </a>
                                            
                                        </div>
                                    )}

                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ProjectPage />);
    </script>
</body>
</html>
